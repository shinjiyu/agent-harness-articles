name: Monitor papers

on:
  schedule:
    # 每天 09:00 UTC+8 ≈ 01:00 UTC
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: monitor-papers
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch new papers (Paper Trends sources)
        run: python scripts/monitor_papers.py

      - name: Detect changes
        id: diff
        shell: bash
        run: |
          if git diff --quiet -- indexes/agent-harness/watchlist.json indexes/agent-harness/inbox; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
          NEW=$(python -c "import json; print(json.load(open('indexes/agent-harness/watchlist.json',encoding='utf-8')).get('last_run',{}).get('new',0))")
          echo "new_count=$NEW" >> "$GITHUB_OUTPUT"

      - name: Commit watchlist / inbox
        if: steps.diff.outputs.changed == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add indexes/agent-harness/watchlist.json indexes/agent-harness/inbox
          git commit -m "chore(monitor): ${{ steps.diff.outputs.new_count }} new paper candidates"
          git push
